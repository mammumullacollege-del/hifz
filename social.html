<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AMCT | Samasta Centenary Poster Creator</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #1a3c6e;
      --primary-dark: #0f2a4a;
      --primary-light: #2b4f8a;
      --accent: #c9a227;
      --accent-light: #e5b73b;
      --gradient-1: linear-gradient(135deg, #1a3c6e, #2b4f8a);
      --gradient-2: linear-gradient(135deg, #c9a227, #e5b73b);
      --success: #10b981;
      --shadow-sm: 0 10px 30px rgba(0,0,0,0.12);
      --shadow-md: 0 20px 40px rgba(0,0,0,0.15);
      --shadow-lg: 0 30px 60px rgba(0,0,0,0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #1e4b8a, #0a2351);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path fill="white" d="M20 20 L30 20 L25 30 Z M70 70 L80 70 L75 80 Z M40 40 L45 35 L50 40 L45 45 Z"/></svg>');
      background-size: 60px 60px;
      pointer-events: none;
    }

    .main-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 48px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 2;
      animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .main-card-header {
      background: var(--gradient-1);
      padding: 25px 30px;
      position: relative;
      overflow: hidden;
    }

    .main-card-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .header-title {
      color: white;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
      position: relative;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header-subtitle {
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      font-weight: 400;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .content-section {
      padding: 40px;
    }

    .title-image {
      width: 100%;
      max-height: 160px;
      object-fit: contain;
      border-radius: 20px;
      margin-bottom: 25px;
      filter: drop-shadow(var(--shadow-sm));
      transition: transform 0.3s ease;
    }

    .title-image:hover {
      transform: scale(1.02);
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 30px;
    }

    .welcome-text h3 {
      color: var(--primary);
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .welcome-text p {
      color: #64748b;
      font-size: 1.1rem;
      font-weight: 400;
    }

    .create-btn {
      background: var(--gradient-1);
      border: none;
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 18px 40px;
      border-radius: 60px;
      width: 100%;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .create-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .create-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .create-btn:hover::before {
      left: 100%;
    }

    .contact-info {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px dashed #e2e8f0;
    }

    .contact-info small {
      color: #64748b;
      font-size: 0.9rem;
    }

    .contact-info i {
      color: var(--accent);
      margin-right: 5px;
    }

    /* Loader */
    .loader-screen {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .loader-content {
      text-align: center;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .loader-spinner {
      width: 80px;
      height: 80px;
      border: 4px solid #e2e8f0;
      border-top-color: var(--primary);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Poster Preview */
    .poster-section {
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .poster-container {
      position: relative;
      width: 100%;
      max-width: 450px;
      margin: 0 auto 30px;
      aspect-ratio: 9 / 16;
      background: #111;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 4px solid white;
      transition: transform 0.3s ease;
    }

    .poster-container:hover {
      transform: scale(1.02);
    }

    .template-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* HALF CIRCLE DESIGN - UPDATED: TOP OF HALF CIRCLE (SEMICIRCLE) */
    .photo-container {
      position: absolute;
      width: 58%;
      aspect-ratio: 1 / 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .user-photo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 8px solid white;
      box-shadow: var(--shadow-lg);
      background: #f1f5f9;
      position: relative;
      z-index: 2;
    }

    .user-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* HALF CIRCLE (SEMICIRCLE) NOW AT THE TOP */
    .half-circle {
      position: absolute;
      top: 15px;        /* changed from bottom: -15px to top: -15px */
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      height: 45px;
      background: linear-gradient(180deg, rgba(255,215,0,0.95), rgba(255,185,0,0.98));
      border-radius: 100px 100px 0 0;  /* flipped to curve at top */
      box-shadow: 0 -5px 15px rgba(0,0,0,0.2); /* adjusted shadow direction */
      z-index: 3;
      display: flex;
      align-items: flex-start;   /* align text to top */
      justify-content: center;
      padding-top: 6px;
      color: var(--primary-dark);
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 2px solid white;
      border-bottom: none;       /* no border at bottom */
      backdrop-filter: blur(2px);
    }

    .half-circle::before {
      content: "★ 100 ★";
      font-size: 0.9rem;
      opacity: 0.9;
    }

    /* Glow effect now above */
    .half-circle-glow {
      position: absolute;
      top: -25px;          /* adjusted from bottom to top */
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      height: 15px;
      background: radial-gradient(ellipse at center, rgba(255,215,0,0.5) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 2;
      filter: blur(5px);
    }

    .success-badge {
      background: var(--gradient-2);
      color: var(--primary);
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
      box-shadow: var(--shadow-sm);
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 25px;
    }

    .social-action-btn {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      padding: 18px 10px;
      text-align: center;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      color: var(--primary);
    }

    .social-action-btn:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      color: var(--primary);
    }

    .social-action-btn i {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
    }

    .social-action-btn.whatsapp i { color: #25D366; }
    .social-action-btn.download i { color: var(--primary); }
    .social-action-btn.new i { color: var(--accent); }

    .social-action-btn span {
      font-size: 0.9rem;
      font-weight: 600;
      display: block;
    }

    /* Modal */
    .modal-custom .modal-content {
      border-radius: 32px;
      border: none;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .modal-custom .modal-header {
      background: var(--gradient-1);
      color: white;
      border: none;
      padding: 20px 25px;
    }

    .modal-custom .modal-header h5 {
      font-weight: 700;
      font-size: 1.4rem;
    }

    .modal-custom .modal-header .close {
      color: white;
      opacity: 0.8;
      text-shadow: none;
      font-size: 2rem;
    }

    .modal-custom .modal-body {
      padding: 30px;
    }

    .custom-file-upload {
      background: #f8fafc;
      border: 2px dashed var(--primary-light);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .custom-file-upload:hover {
      background: #f1f5f9;
      border-color: var(--primary);
    }

    .custom-file-upload i {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .custom-file-upload p {
      margin: 0;
      color: var(--primary);
      font-weight: 600;
    }

    .custom-file-upload small {
      color: #64748b;
    }

    #fileInput {
      display: none;
    }

    .img-container {
      background: #f8fafc;
      border-radius: 16px;
      padding: 15px;
      margin-top: 20px;
      max-height: 400px;
      overflow: hidden;
    }

    #cropImage {
      max-width: 100%;
      max-height: 350px;
    }

    #createPosterBtn {
      background: var(--gradient-2);
      border: none;
      color: var(--primary);
      font-weight: 700;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 1.1rem;
      width: 100%;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    #createPosterBtn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-sm);
    }

    @media (max-width: 576px) {
      .content-section { padding: 25px; }
      .header-title { font-size: 1.6rem; }
      .welcome-text h3 { font-size: 1.8rem; }
      .feature-grid { grid-template-columns: 1fr; }
      .social-grid { grid-template-columns: 1fr; }
      .half-circle { height: 35px; font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="main-card">

<!-- Crop Modal -->

  <div class="modal-dialog modal-lg modal-dialog-centered">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>
  $(document).ready(function() {
    let cropper = null;
    const $modal = $('#cropModal');
    const templateSrc = "https://i.ibb.co/q36Rmxyf/df440d59c3c14e4bff119951f9b32eec.png";

    // Start button click
    $('#startBtn').click(() => {
      $modal.modal('show');
    });

    // File input change
    $('#fileInput').change(function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        if (cropper) cropper.destroy();

        $('#cropImage')
          .attr('src', ev.target.result)
          .show();

        setTimeout(() => {
          cropper = new Cropper($('#cropImage')[0], {
            aspectRatio: 1,
            viewMode: 1,
            autoCropArea: 0.92,
            responsive: true,
            guides: true,
            center: true,
            highlight: false,
            dragMode: 'move',
            cropBoxResizable: true,
            minCropBoxWidth: 200,
            minCropBoxHeight: 200,
            ready() {
              $('#createPosterBtn').fadeIn(300);
            }
          });
        }, 100);
      };
      reader.readAsDataURL(file);
    });

    // Create poster button
    $('#createPosterBtn').click(function() {
      if (!cropper) return;

      const canvas = cropper.getCroppedCanvas({
        width: 900,
        height: 900,
        fillColor: '#ffffff'
      });

      const circular = makeCircular(canvas);
      const photoDataUrl = circular.toDataURL('image/jpeg', 0.95);

      $modal.modal('hide');
      $('#loaderScreen').fadeIn(400);

      setTimeout(() => {
        generateFinalPoster(photoDataUrl);
      }, 1500);
    });

    // Make circular image
    function makeCircular(sourceCanvas) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const size = Math.min(sourceCanvas.width, sourceCanvas.height);

      canvas.width = size;
      canvas.height = size;

      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();

      ctx.drawImage(sourceCanvas, 0, 0, size, size);

      return canvas;
    }

    // Generate final poster
    function generateFinalPoster(userPhotoSrc) {
      const template = new Image();
      template.crossOrigin = "anonymous";
      template.src = templateSrc;

      template.onload = () => {
        const userImg = new Image();
        userImg.src = userPhotoSrc;

        userImg.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');

          canvas.width = 1080;
          canvas.height = 1920;

          // Draw template
          ctx.drawImage(template, 0, 0, canvas.width, canvas.height);

          // Calculate photo position
          const photoSize = canvas.width * 0.58;
          const x = (canvas.width - photoSize) / 2;
          const y = (canvas.height - photoSize) / 2;

          // Draw circular photo
          ctx.save();
          ctx.beginPath();
          ctx.arc(x + photoSize/2, y + photoSize/2, photoSize/2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();

          ctx.drawImage(userImg, x, y, photoSize, photoSize);
          ctx.restore();

          // Draw white border around photo
          ctx.beginPath();
          ctx.arc(x + photoSize/2, y + photoSize/2, photoSize/2, 0, Math.PI * 2);
          ctx.lineWidth = 14;
          ctx.strokeStyle = 'white';
          ctx.stroke();

          // Draw HALF CIRCLE ABOVE the photo (top semicircle) - UPDATED
          const halfCircleY = y + 30; // Position at top of photo
          const halfCircleWidth = photoSize * 1.8;
          const halfCircleHeight = 180;

          // Draw gold half circle (flipped upward)
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(x + (photoSize - halfCircleWidth)/2, halfCircleY + photoSize); // bottom left anchor
          ctx.quadraticCurveTo(
            x + photoSize/2, 
            halfCircleY - halfCircleHeight * 0.8,  // curve upward
            x + photoSize - (photoSize - halfCircleWidth)/2, 
            halfCircleY + photoSize
          );
          ctx.closePath();
          
          // Fill with gradient
          const gradient = ctx.createLinearGradient(
            x + photoSize/2, halfCircleY + photoSize - 40,
            x + photoSize/2, halfCircleY + 40
          );
          gradient.addColorStop(0, '#FFD700');
          gradient.addColorStop(1, '#FFB800');
          
          ctx.fillStyle = gradient;
          ctx.fill();
          
          // Add white border
          ctx.strokeStyle = 'white';
          ctx.lineWidth = 4;
          ctx.stroke();

          // Add text on half circle
          ctx.font = 'bold 40px "Poppins"';
          ctx.fillStyle = '#1a3c6e';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('★ 100 ★', x + photoSize/2, halfCircleY + photoSize/2.5 + 20);
          ctx.restore();

          const finalUrl = canvas.toDataURL('image/jpeg', 0.95);

          // Update UI
          $('#finalPosterImg').attr('src', finalUrl);
          $('#finalUserPhoto').attr('src', userPhotoSrc);
          $('#downloadBtn').attr('href', finalUrl);

          // WhatsApp share
          const text = encodeURIComponent(
            "✨ സമസ്ത നൂറാം വാർഷികം സ്പെഷ്യൽ പോസ്റ്റർ ✨\n\nനിങ്ങളുടെ സ്വന്തം പോസ്റ്ററും ഉണ്ടാക്കൂ 👇\n\nhttps://amct.edu.in/poster-creator"
          );
          $('#whatsappBtn').attr('href', `https://wa.me/?text=${text}`);

          // Show result
          $('#mainContent').hide();
          $('#resultArea').fadeIn(600);
          $('#loaderScreen').fadeOut(400);
        };
      };

      template.onerror = () => {
        alert("⚠️ Could not load template. Please check your internet connection.");
        $('#loaderScreen').hide();
      };
    }

    // Modal close handler
    $modal.on('hidden.bs.modal', function() {
      if (cropper) {
        cropper.destroy();
        cropper = null;
      }
      $('#fileInput').val('');
      $('#cropImage').hide();
      $('#createPosterBtn').hide();
    });
  });
</script>

</body>
</html>
